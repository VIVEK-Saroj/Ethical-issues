databases:
  - name: bigmart-db
    plan: free
    databaseName: bigmart
    user: bigmart

services:
  - type: web
    name: big-mart-api
    runtime: docker
    plan: free
    dockerfilePath: ./big-mart-ai/backend/Dockerfile.prod
    dockerContext: ./big-mart-ai/backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bigmart-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
